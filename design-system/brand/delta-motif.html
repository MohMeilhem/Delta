<p class="note">Delta's signature: shared history splits at the forecast boundary into the machine baseline (green) and the analyst's projection (amber). The shaded gap between them is the product. Used on the app masthead and the sign-in page; in product it animates with a draw-on sequence (reduced-motion aware).</p>
