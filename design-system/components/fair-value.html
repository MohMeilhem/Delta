<!-- @dsCard group="Components" name="Fair-value readout row" -->
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&family=IBM+Plex+Mono:wght@500&family=Alexandria:wght@600;700&display=swap" rel="stylesheet">
<style>
  body { margin:0; padding:28px; background:oklch(0.135 0.014 180); color:oklch(0.95 0.006 170);
         font:12px/1.6 'IBM Plex Sans Arabic', system-ui, sans-serif; direction:rtl; }
  .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:28px; }
  .label { font-size:11px; color:oklch(0.75 0.015 175); }
  .value { margin-top:10px; display:flex; align-items:baseline; gap:8px;
           font:600 30px 'Alexandria', sans-serif; letter-spacing:-0.015em; direction:ltr; justify-content:flex-end; }
  .unit { font:400 11px 'IBM Plex Sans Arabic', sans-serif; color:oklch(0.56 0.015 175); }
  .facts { margin-top:26px; display:flex; flex-wrap:wrap; justify-content:center; gap:8px 32px; font-size:11px; color:oklch(0.56 0.015 175); }
  .facts b { font:500 11px 'IBM Plex Mono', monospace; color:oklch(0.95 0.006 170); font-weight:500; direction:ltr; unicode-bidi:isolate; }
  .zk { color:oklch(0.78 0.145 163); }
</style>

</div>
<div class="facts">
