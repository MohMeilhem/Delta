<meta charset="utf-8">
<style>
  body { margin:0; padding:24px; background:oklch(0.135 0.014 180); color:oklch(0.95 0.006 170);

  .screen { background:radial-gradient(120% 90% at 50% 0%, oklch(0.145 0.016 182), oklch(0.115 0.014 182) 70%);

            box-shadow:inset 0 1px 8px oklch(0 0 0 / .35); }
  text { font:10px 'IBM Plex Mono', monospace; fill:oklch(0.56 0.015 175); }
  .legend { margin-top:12px; display:flex; gap:20px; font-size:11px; color:oklch(0.75 0.015 175); direction:rtl; }
  .legend span { display:flex; align-items:center; gap:6px; }
</style>
